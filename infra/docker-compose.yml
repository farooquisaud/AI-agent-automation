services:

  mongo:
    image: mongo:7
    container_name: agentautomation-mongo
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mongo-init-replica:
    image: mongo:7
    depends_on:
      mongo:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      bash -c "
      mongosh --host mongo:27017 --eval '
        rs.initiate({
          _id: \"rs0\",
          members: [{ _id: 0, host: \"mongo:27017\" }]
        })
      ' || true
      "

  backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile
      target: backend
    container_name: agentautomation-backend

    env_file:
      - .env

    environment:
      NODE_ENV: production

    ports:
      - "5000:5000"

    depends_on:
      mongo:
        condition: service_healthy
      mongo-init-replica:
        condition: service_completed_successfully

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile
      target: backend
    container_name: agentautomation-worker

    command: ["npm", "run", "worker"]

    env_file:
      - .env

    environment:
      NODE_ENV: production

    depends_on:
      mongo:
        condition: service_healthy
      backend:
        condition: service_started

    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: infra/Dockerfile
      target: frontend
    container_name: agentautomation-frontend

    ports:
      - "3000:3000"

    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:5000

    depends_on:
      backend:
        condition: service_healthy

    restart: unless-stopped

volumes:
  mongo_data: